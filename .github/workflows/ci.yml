name: CI

on:
  push:
    branches: [main, mvp]
  pull_request:
    branches: [main, mvp]

# Default least privilege; jobs that need more declare it explicitly (e.g. CodeQL).
permissions:
  contents: read

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx turbo typecheck --filter=web --filter=@codecard/*

      - name: Test
        run: npm run test

      - name: Build web
        run: npm run build --workspace=web
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  e2e-auth:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web for Playwright
        run: npm run build --workspace=web
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Auth E2E smoke tests
        working-directory: apps/web
        run: npx playwright test e2e/auth.spec.ts --project=desktop-1440

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Secret scan
        run: npm run security:scan

      - name: Check for hardcoded secrets patterns
        run: |
          set -euo pipefail
          if grep -rE "sk_live_[a-zA-Z0-9]{16,}|sk_test_[a-zA-Z0-9]{16,}" --include="*.ts" --include="*.tsx" --include="*.js" apps/ packages/; then
            echo "Potential secret found in source"
            exit 1
          fi

  # WS11-T009: blocking dependency audit against the root monorepo lockfile.
  # Threshold: fail on high and critical (see docs/CI_SECURITY_AUDITING.md).
  dependency-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability audit
        run: npm run security:audit
